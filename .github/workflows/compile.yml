name: Compile checks

on:
  push:
  pull_request:

jobs:
  host-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clangd

      - name: Run syntax and host checks
        run: |
          ./check_py.bash
          bash ./check_host.bash
          ./check.bash

  esphome-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-esphome-2026.5.3

      - name: Install pinned ESPHome
        run: python -m pip install "esphome==2026.5.3"

      - name: Compile and validate ESPHome fixtures
        run: bash ./check_esphome.bash
