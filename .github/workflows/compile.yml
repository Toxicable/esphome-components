name: Compile checks

on:
  push:
  pull_request:

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare devcontainer mount points
        run: |
          mkdir -p "$HOME/.codex" "$HOME/.ssh"

      - name: Run repository checks in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            ./check_py.bash
            bash ./check_host.bash
            ./check.bash
            bash ./check_esphome.bash
