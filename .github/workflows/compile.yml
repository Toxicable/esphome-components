name: Compile checks

on:
  push:
  pull_request:

permissions:
  contents: write

concurrency:
  group: compile-checks-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  hard-cut-bq76952-operations:
    if: github.actor != 'github-actions[bot]' && ((github.event_name == 'push' && github.ref_name == 'agent/hard-cut-register-api') || (github.event_name == 'pull_request' && github.head_ref == 'agent/hard-cut-register-api'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/hard-cut-register-api
          fetch-depth: 0

      - name: Apply BQ76952 operation migration
        run: python3 tools/hard_cut_bq76952_operations.py

      - name: Verify host tests
        run: bash ./check_host.bash 2>&1 | tee hard-cut-bq76952-host.log

      - name: Upload BQ76952 migration diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hard-cut-bq76952-failure
          path: |
            hard-cut-bq76952-host.log
            components/bq76952
          if-no-files-found: error

      - name: Commit transformed sources
        run: |
          if git diff --quiet; then
            echo "No migration changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/bq76952 components/component_common/operation_info.h tests
          git commit -m "Hard cut BQ76952 operations to typed IDs"
          git push origin HEAD:agent/hard-cut-register-api

  host-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Python syntax
        run: ./check_py.bash

      - name: Run host core tests
        run: bash ./check_host.bash 2>&1 | tee host-check-failure.log

      - name: Upload host failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: host-check-failure
          path: host-check-failure.log
          if-no-files-found: error

  esphome-checks:
    name: ESPHome ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bq25756
            config: components/bq25756/test_config.yaml
          - name: bq25756-invalid-cell-count
            config: components/bq25756/test_invalid_cell_count.yaml
          - name: bq76952
            config: components/bq76952/test_config.yaml
          - name: drv8243
            config: components/drv8243/test_config.yaml
          - name: esc-higher
            config: components/esc_higher/test_config.yaml
          - name: lps25hb
            config: components/lps25hb/test_config.yaml
          - name: mcf8316d
            config: components/mcf8316d/test_config.yaml
          - name: mcf8329a
            config: components/mcf8329a/test_config.yaml
          - name: mlx90614
            config: components/mlx90614/test_config.yaml
          - name: programmable-load
            config: components/programmable_load/test_config.yaml
          - name: programmable-load-invalid-hardware-voltage
            config: components/programmable_load/test_invalid_hardware_voltage.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-esphome-2026.5.3

      - name: Install pinned ESPHome
        run: python -m pip install "esphome==2026.5.3"

      - name: Compile or validate fixture
        run: bash ./check_esphome.bash "${{ matrix.config }}"

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: esphome-failure-${{ matrix.name }}
          path: esphome-failure.log
          if-no-files-found: ignore
