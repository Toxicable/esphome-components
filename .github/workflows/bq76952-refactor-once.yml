name: BQ76952 one-shot refactor

on:
  push:
    branches:
      - agent/implement-bq76952-services
    paths:
      - .github/workflows/bq76952-refactor-once.yml

permissions:
  contents: write

jobs:
  refactor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/implement-bq76952-services
          fetch-depth: 0
      - name: Apply refactor
        run: python3 .github/scripts/bq76952_refactor_once.py
      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: name bq76952 constants and expose learned capacity"
          git push origin HEAD:agent/implement-bq76952-services
