name: Publish Phase 4

on:
  pull_request:

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'agent/phase4-publisher'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout publisher payload
        uses: actions/checkout@v4
        with:
          path: payload

      - name: Checkout Phase 3 base
        uses: actions/checkout@v4
        with:
          ref: agent/typed-charger-capability
          path: target
          fetch-depth: 0

      - name: Reconstruct BQ consistency patch
        shell: bash
        run: |
          set -euo pipefail
          cat payload/.phase4/plain.0{0..8} > phase4.raw.patch
          python3 - <<'PY'
          from pathlib import Path
          raw = Path('phase4.raw.patch').read_bytes()
          assert len(raw) == 156405, len(raw)
          start = 55251
          duplicate_length = 17447
          fixed = raw[:start] + raw[start + duplicate_length:]
          Path('phase4.patch').write_bytes(fixed)
          PY
          printf '%s  %s\n' '19fe6ebf8067056adc6ab283e00e4ea57955f31434f86c3310528872c874ad7b' phase4.patch | sha256sum --check
          test "$(wc -c < phase4.patch)" -eq 138958

      - name: Apply BQ consistency patch
        shell: bash
        run: |
          set -euo pipefail
          cd target
          git apply --check ../phase4.patch
          git apply --index ../phase4.patch
          git diff --cached --check

      - name: Check Python modules
        shell: bash
        run: |
          set -euo pipefail
          cd target
          python3 -m py_compile components/bq76952/*.py

      - name: Run host tests
        shell: bash
        run: |
          set -o pipefail
          cd target
          bash ./check_host.bash 2>&1 | tee ../phase4-host.log

      - name: Upload host failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phase4-host-failure
          path: phase4-host.log
          if-no-files-found: ignore

      - name: Publish BQ consistency branch
        shell: bash
        run: |
          set -euo pipefail
          cd target
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -b agent/bq-consistency
          git commit -m 'Standardize BQ lifecycle and fault boundaries'
          git push origin HEAD:refs/heads/agent/bq-consistency
