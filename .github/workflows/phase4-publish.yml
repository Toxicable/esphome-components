name: Publish BQ status follow-up

on:
  push:
    branches:
      - agent/phase4-publisher
  pull_request:

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'agent/phase4-publisher' || github.ref_name == 'agent/phase4-publisher'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout publisher payload
        uses: actions/checkout@v4
        with:
          path: payload

      - name: Checkout BQ consistency branch
        uses: actions/checkout@v4
        with:
          ref: agent/bq-consistency
          path: target
          fetch-depth: 0

      - name: Reconstruct status follow-up patch
        shell: bash
        run: |
          set -euo pipefail
          cat \
            payload/.phase4/followup.00 \
            payload/.phase4/followup.schema-header \
            payload/.phase4/followup.01 \
            payload/.phase4/followup.02 \
            payload/.phase4/followup.03 \
            > status-followup.patch
          wc -c status-followup.patch
          sha256sum status-followup.patch

      - name: Apply status follow-up patch
        shell: bash
        run: |
          set -euo pipefail
          cd target
          git apply --check ../status-followup.patch
          git apply --index ../status-followup.patch
          git diff --cached --check

      - name: Check Python modules
        shell: bash
        run: |
          set -euo pipefail
          cd target
          python3 -m py_compile components/bq76952/*.py

      - name: Run host tests
        shell: bash
        run: |
          set -o pipefail
          cd target
          bash ./check_host.bash 2>&1 | tee ../status-followup-host.log

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bq-status-followup-failure
          path: |
            status-followup.patch
            status-followup-host.log
          if-no-files-found: ignore

      - name: Publish follow-up
        shell: bash
        run: |
          set -euo pipefail
          cd target
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Make BQ status ESPHome-facing'
          git push origin HEAD:refs/heads/agent/bq-consistency
