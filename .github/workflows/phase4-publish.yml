name: Publish BQ status follow-up

on:
  push:
    branches:
      - agent/phase4-publisher
  pull_request:

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'agent/phase4-publisher' || github.ref_name == 'agent/phase4-publisher'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout publisher payload
        uses: actions/checkout@v4
        with:
          path: payload

      - name: Checkout BQ consistency branch
        uses: actions/checkout@v4
        with:
          ref: agent/bq-consistency
          path: target
          fetch-depth: 0

      - name: Reconstruct exact status transformer
        shell: bash
        run: |
          set -euo pipefail
          cat payload/.phase4/apply-status.0.b64 payload/.phase4/apply-status.1a.b64 > apply-status.b64
          rev payload/.phase4/apply-status.1b.rev >> apply-status.b64
          rev payload/.phase4/apply-status.1c.rev >> apply-status.b64
          tr -d '\n' < payload/.phase4/apply-status.1d.folded | rev >> apply-status.b64
          base64 --decode apply-status.b64 | gzip --decompress > apply_status_followup.py
          printf '%s  %s\n' 'fbe33d28f00f028c6ec1fc81892374e3d278314fecc2d96b96998793bad851f2' apply_status_followup.py | sha256sum --check

      - name: Apply ESPHome-facing status changes
        shell: bash
        run: |
          set -euo pipefail
          cd target
          python3 ../apply_status_followup.py
          git diff --check

      - name: Check Python modules
        shell: bash
        run: |
          set -euo pipefail
          cd target
          python3 -m py_compile components/bq76952/*.py

      - name: Run host tests
        shell: bash
        run: |
          set -o pipefail
          cd target
          bash ./check_host.bash 2>&1 | tee ../status-followup-host.log

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bq-status-followup-failure
          path: |
            apply_status_followup.py
            status-followup-host.log
          if-no-files-found: ignore

      - name: Publish follow-up
        shell: bash
        run: |
          set -euo pipefail
          cd target
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            ARCHITECTURE.md \
            COMPONENTS.md \
            components/component_common \
            components/bq76952 \
            tests
          git commit -m 'Make BQ status ESPHome-facing'
          git push origin HEAD:refs/heads/agent/bq-consistency
