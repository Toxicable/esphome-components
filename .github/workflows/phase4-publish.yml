name: Publish BQ status follow-up

on:
  push:
    branches:
      - agent/phase4-publisher
  pull_request:

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'agent/phase4-publisher' || github.ref_name == 'agent/phase4-publisher'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout publisher payload
        uses: actions/checkout@v4
        with:
          path: payload

      - name: Checkout BQ consistency branch
        uses: actions/checkout@v4
        with:
          ref: agent/bq-consistency
          path: target
          fetch-depth: 0

      - name: Reconstruct status follow-up patch
        shell: bash
        run: |
          set -euo pipefail
          cat payload/.phase4/followup.0{0..3} > status-followup.patch
          printf '%s  %s\n' '35816a37b60c0666f8da6cf2b20fd0a759fa98ac9a2c291e8e03f58cafb8a8f9' status-followup.patch | sha256sum --check
          test "$(wc -c < status-followup.patch)" -eq 42056

      - name: Apply status follow-up patch
        shell: bash
        run: |
          set -euo pipefail
          cd target
          git apply --check ../status-followup.patch
          git apply --index ../status-followup.patch
          git diff --cached --check

      - name: Check Python modules
        shell: bash
        run: |
          set -euo pipefail
          cd target
          python3 -m py_compile components/bq76952/*.py

      - name: Run host tests
        shell: bash
        run: |
          set -o pipefail
          cd target
          bash ./check_host.bash 2>&1 | tee ../status-followup-host.log

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bq-status-followup-failure
          path: status-followup-host.log
          if-no-files-found: ignore

      - name: Publish follow-up
        shell: bash
        run: |
          set -euo pipefail
          cd target
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Make BQ status ESPHome-facing'
          git push origin HEAD:refs/heads/agent/bq-consistency
