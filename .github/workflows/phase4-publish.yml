name: Publish Phase 4

on:
  pull_request:

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'agent/phase4-publisher'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout publisher payload
        uses: actions/checkout@v4
        with:
          path: payload

      - name: Checkout Phase 3 base
        uses: actions/checkout@v4
        with:
          ref: agent/typed-charger-capability
          path: target
          fetch-depth: 0

      - name: Reconstruct BQ consistency patch
        shell: bash
        run: |
          set -euo pipefail
          cat payload/.phase4/plain.0{0..8} > phase4.patch
          sha256sum phase4.patch > phase4-patch.sha256
          wc -c phase4.patch
          cat phase4-patch.sha256

      - name: Upload reconstructed patch and chunks
        uses: actions/upload-artifact@v4
        with:
          name: phase4-reconstructed-patch
          path: |
            phase4.patch
            phase4-patch.sha256
            payload/.phase4/plain.00
            payload/.phase4/plain.01
            payload/.phase4/plain.02
            payload/.phase4/plain.03
            payload/.phase4/plain.04
            payload/.phase4/plain.05
            payload/.phase4/plain.06
            payload/.phase4/plain.07
            payload/.phase4/plain.08

      - name: Apply BQ consistency patch
        shell: bash
        run: |
          set -euo pipefail
          printf '%s  %s\n' '2232d0862ccf991784ebf537a95e592477b37db93d3027ddd258c7a597476fd2' phase4.patch | sha256sum --check
          cd target
          git apply --check ../phase4.patch
          git apply --index ../phase4.patch
          git diff --cached --check

      - name: Check Python modules
        shell: bash
        run: |
          set -euo pipefail
          cd target
          python3 -m py_compile components/bq76952/*.py

      - name: Run host tests
        shell: bash
        run: |
          set -o pipefail
          cd target
          bash ./check_host.bash 2>&1 | tee ../phase4-host.log

      - name: Upload host failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phase4-host-failure
          path: phase4-host.log
          if-no-files-found: ignore

      - name: Publish BQ consistency branch
        shell: bash
        run: |
          set -euo pipefail
          cd target
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -b agent/bq-consistency
          git commit -m 'Standardize BQ lifecycle and fault boundaries'
          git push origin HEAD:refs/heads/agent/bq-consistency
