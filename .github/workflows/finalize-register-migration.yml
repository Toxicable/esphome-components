name: Finalize register migration

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[finalized-register-migration]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Remove final stale typed-address conversion
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('components/mcf8329a/mcf8329a_tuning.cpp')
          text = path.read_text()
          old = '      register_address(RegisterId::INT_ALGO_2),\n'
          new = '      RegisterId::INT_ALGO_2,\n'
          if text.count(old) != 1:
              raise RuntimeError(f'expected exactly one stale INT_ALGO_2 conversion, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY

      - name: Run host suite
        run: bash ./check_host.bash

      - name: Compile affected ESPHome fixtures
        run: |
          python -m pip install "esphome==2026.5.3"
          bash ./check_esphome.bash components/mcf8316d/test_config.yaml
          bash ./check_esphome.bash components/mcf8329a/test_config.yaml
          bash ./check_esphome.bash components/programmable_load/test_config.yaml

      - name: Commit validated cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add components/mcf8329a/mcf8329a_tuning.cpp
          git commit -m "Finish typed register call-site migration [finalized-register-migration]"
          git push origin HEAD:main
