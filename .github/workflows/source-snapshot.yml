name: Source snapshot

on:
  push:
    branches:
      - agent/source-snapshot-temp
  pull_request:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: charger-phase-source
          path: |
            components/component_common
            components/bq25756
            components/programmable_load
          if-no-files-found: error
