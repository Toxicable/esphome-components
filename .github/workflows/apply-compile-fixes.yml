name: Apply compile fixes

on:
  push:
    branches:
      - agent/migrate-all-components-common-patterns
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/migrate-all-components-common-patterns
          fetch-depth: 0

      - name: Apply fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              p = Path(path)
              text = p.read_text()
              actual = text.count(old)
              if actual != count:
                  raise RuntimeError(f"{path}: expected {count} occurrences, found {actual}: {old!r}")
              p.write_text(text.replace(old, new))

          Path("components/mcf8316d/mcf8316d_bus.h").write_text("""#pragma once

#include "../mcf83xx_common/register_bus.h"
#include "mcf8316d_registers.h"

namespace mcf8316d_core {

using RegisterBus = mcf83xx_common::RegisterBus;
using RegisterId = regs::RegisterId;

}  // namespace mcf8316d_core

namespace esphome {
namespace mcf8316d {

using RegisterId = ::mcf8316d_core::RegisterId;

}  // namespace mcf8316d
}  // namespace esphome
""")

          Path("components/mcf8329a/mcf8329a_bus.h").write_text("""#pragma once

#include "../mcf83xx_common/register_bus.h"
#include "mcf8329a_registers.h"

namespace mcf8329a_core {

using RegisterBus = mcf83xx_common::RegisterBus;
using RegisterId = regs::RegisterId;

}  // namespace mcf8329a_core

namespace esphome {
namespace mcf8329a {

using RegisterId = ::mcf8329a_core::RegisterId;

}  // namespace mcf8329a
}  // namespace esphome
""")

          bq = Path("components/bq76952/bq76952_registers.h")
          text = bq.read_text()
          if text.count("RegisterWidth::VARIABLE") != 3:
              raise RuntimeError("Expected exactly three variable-width TS config entries")
          text = text.replace("RegisterWidth::VARIABLE", "RegisterWidth::U8")
          text = text.replace("definition.name[0] == '\x00'", "definition.name[0] == '\\0'")
          bq.write_text(text)

          replace(
              "components/programmable_load/programmable_load.h",
              "calibration.output.full_scale_current =",
              "calibration.output.full_scale_current_a =",
          )

          replace(
              "components/esc_higher/esc_higher.cpp",
              "constexpr uint32_t INIT_RETRY_INTERVAL_MS = 1000;\n",
              "constexpr uint32_t INIT_RETRY_INTERVAL_MS = 1000;\nconstexpr int32_t COMMAND_WATCHDOG_TIMEOUT_MS = 500;\n",
          )
          PY

      - name: Validate host suite
        run: bash ./check_host.bash

      - name: Commit fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add components
          git commit -m "Fix typed register ESPHome compilation"
          git push origin HEAD:agent/migrate-all-components-common-patterns
