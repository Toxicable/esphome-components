esphome:
  name: mcp4726-test
  min_version: 2026.5.3

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: ..
    refresh: 0s
    components: [ component_common, mcp4726 ]

i2c:
  id: i2c_bus
  sda: GPIO35
  scl: GPIO36
  scan: false

output:
  - platform: mcp4726
    id: dac_output
    i2c_id: i2c_bus
    address: 0x60
    vref: vref_buffered
    gain: 1x
    power_down: normal
    zero_on_boot: true
